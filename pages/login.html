<!DOCTYPE html>
<html lang="en" id="html-root" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Boutique Wine Events</title>
    <meta name="description"
        content="Sign in or register for Boutique Wine Events to access exclusive events and your personal dashboard." />
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/dark-mode.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=1600&q=75');
            background-size: cover;
            background-position: center;
            padding: var(--space-xl);
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(26, 10, 10, 0.88), rgba(90, 20, 20, 0.75));
        }

        .auth-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
            box-shadow: var(--shadow-lg);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: var(--space-xl);
        }

        .auth-logo .logo-name {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            color: var(--color-gold);
            font-weight: 700;
        }

        .auth-logo .logo-sub {
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }

        .auth-tabs {
            display: flex;
            background: var(--bg);
            border-radius: var(--radius-full);
            padding: 4px;
            margin-bottom: var(--space-xl);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .auth-tab.active {
            background: var(--color-primary);
            color: #fff;
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin: var(--space-lg) 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .auth-divider span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .social-login {
            display: flex;
            gap: var(--space-md);
        }

        .social-btn {
            flex: 1;
            padding: 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg);
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .social-btn:hover {
            border-color: var(--color-gold);
            color: var(--text-primary);
        }

        .forgot-link {
            font-size: 0.82rem;
            color: var(--color-gold);
            float: right;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .auth-bottom {
            margin-top: var(--space-lg);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-bottom a {
            color: var(--color-gold);
        }

        @media(max-width:480px) {
            .auth-card {
                padding: var(--space-lg);
                border-radius: var(--radius-lg);
            }

            .auth-page {
                padding: var(--space-md);
            }

            .social-login {
                flex-direction: column;
            }

            #register-form>div:first-child {
                grid-template-columns: 1fr;
            }
        }

        /* Make logo clickable */
        .auth-logo a {
            text-decoration: none;
            display: block;
            transition: opacity 0.2s;
        }

        .auth-logo a:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <!-- No navbar on login page -->
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="../index.html" title="Go to Home">
                    <svg width="48" height="48" viewBox="0 0 44 44" fill="none"
                        style="margin:0 auto 8px;display:block;">
                        <circle cx="22" cy="22" r="21" stroke="#C9A84C" stroke-width="1.5" />
                        <path d="M22 8C22 8 14 16 14 23a8 8 0 0016 0c0-7-8-15-8-15z" fill="#8B1A1A" stroke="#C9A84C"
                            stroke-width="1" />
                        <rect x="20.5" y="31" width="3" height="5" rx="1" fill="#C9A84C" />
                        <rect x="17" y="36" width="10" height="1.5" rx="0.75" fill="#C9A84C" />
                    </svg>
                    <div class="logo-name">Boutique</div>
                    <div class="logo-sub">Wine Events</div>
                </a>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" data-target="panel-login" role="tab" aria-selected="true"
                    id="tab-login">Sign In</button>
                <button class="auth-tab" data-target="panel-register" role="tab" aria-selected="false"
                    id="tab-register">Register</button>
            </div>

            <!-- Login Panel -->
            <div class="auth-panel active" id="panel-login" role="tabpanel">
                <div class="social-login" style="margin-bottom:var(--space-lg);">
                    <button class="social-btn">🌐 Google</button>
                    <button class="social-btn">f Facebook</button>
                </div>
                <div class="auth-divider"><span>or continue with email</span></div>
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" class="form-control" placeholder="you@example.com"
                            required />
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password <a href="#" class="forgot-link">Forgot?</a></label>
                        <input type="password" id="login-password" class="form-control" placeholder="••••••••"
                            required />
                    </div>
                    <button type="submit" class="btn btn-primary"
                        style="width:100%;justify-content:center;margin-top:var(--space-sm);"
                        onclick="window.location='../dashboard/dashboard.html';return false;">Sign In</button>
                </form>
                <div class="auth-bottom">Don't have an account? <a href="#"
                        onclick="document.getElementById('tab-register').click();return false;">Register now</a></div>
            </div>

            <!-- Register Panel -->
            <div class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
                <form id="register-form" novalidate>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
                        <div class="form-group"><label for="reg-first">First Name</label><input type="text"
                                id="reg-first" class="form-control" placeholder="Jane" required /></div>
                        <div class="form-group"><label for="reg-last">Last Name</label><input type="text" id="reg-last"
                                class="form-control" placeholder="Doe" required /></div>
                    </div>
                    <div class="form-group"><label for="reg-email">Email Address</label><input type="email"
                            id="reg-email" class="form-control" placeholder="you@example.com" required /></div>
                    <div class="form-group"><label for="reg-password">Password</label><input type="password"
                            id="reg-password" class="form-control" placeholder="Min. 8 characters" required /></div>
                    <div class="form-group"><label for="reg-confirm">Confirm Password</label><input type="password"
                            id="reg-confirm" class="form-control" placeholder="Repeat password" required /></div>
                    <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;"
                        onclick="window.location='../dashboard/dashboard.html';return false;">Create Account</button>
                </form>
                <div class="auth-bottom">Already have an account? <a href="#"
                        onclick="document.getElementById('tab-login').click();return false;">Sign in</a></div>
            </div>
        </div>
    </main>
    <script src="../assets/js/main.js"></script>
</body>

</html>
